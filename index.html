<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Naomy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        /* Fondo Animado */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fondo..jfif'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: moveBackground 30s ease-in-out infinite;
        }

        @keyframes moveBackground {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* Contenedor Principal */
        .overlay-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .name-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 20px 50px;
            border-radius: 25px;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 12px;
            text-align: center;
            background-image: linear-gradient(135deg, #ffffff, #ffb3d9, #ffffff, #ffe066, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* Contenedor del Botón y el Mensaje */
        .heart-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Mensaje Pequeño */
        .tooltip-msg {
            position: absolute;
            top: -45px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 12px;
            color: white;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: floatMsg 2s ease-in-out infinite;
            transition: opacity 0.5s ease;
        }

        @keyframes floatMsg {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Botón de Corazón */
        #btnMusica {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ff4d94;
            font-size: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        #btnMusica.playing {
            color: #ff0000;
            background: rgba(255, 255, 255, 0.3);
            animation: heartbeat 0.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        /* Chispas y Emojis */
        .falling-emoji { position: absolute; top: -50px; z-index: 5; animation: fall linear infinite; }
        .mouse-spark { position: absolute; width: 8px; height: 8px; border-radius: 50%; animation: sparkFade 1s ease-out forwards; }
        
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        @keyframes sparkFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div id="rainContainer"></div>
    <div id="sparkleContainer"></div>

    <div class="overlay-center">
        <div class="name-box">NAOMY</div>
        <div class="heart-container">
            <div class="tooltip-msg" id="msg">Presiona el corazón</div>
            <button id="btnMusica" onclick="toggleMusica()">❤️</button>
        </div>
    </div>

    <audio id="miMusica" loop>
        <source src="ayayay.mp3" type="audio/mpeg">
    </audio>

    <script>
        const emojis = ['❤️', '🦫', '🌸', '✨', '🌹'];
        const container = document.getElementById('rainContainer');

        function createEmoji() {
            const e = document.createElement('div');
            e.classList.add('falling-emoji');
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            e.style.animationDuration = (Math.random() * 6 + 5) + 's';
            container.appendChild(e);
            setTimeout(() => e.remove(), 11000);
        }
        setInterval(createEmoji, 400);

        // Efecto Mouse
        window.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.8) {
                const spark = document.createElement('div');
                spark.classList.add('mouse-spark');
                spark.style.left = e.clientX + 'px';
                spark.style.top = e.clientY + 'px';
                spark.style.backgroundColor = ['#fff', '#ffd700', '#ffb3d9'][Math.floor(Math.random()*3)];
                document.getElementById('sparkleContainer').appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        });

        // Control de música
        function toggleMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            const msg = document.getElementById('msg');
            
            if (audio.paused) {
                audio.play();
                btn.classList.add('playing');
                msg.style.opacity = "0"; // Oculta el mensaje al activar
            } else {
                audio.pause();
                btn.classList.remove('playing');
                msg.style.opacity = "1"; // Lo muestra si se pausa
            }
        }
    </script>
</body>
</html>
