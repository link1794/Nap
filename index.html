<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Naomy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        /* Fondo Animado */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('descarga (1).jfif'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: moveBackground 30s ease-in-out infinite;
        }

        @keyframes moveBackground {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* Letrero Principal (Glassmorphism) */
        .overlay-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .name-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 30px 60px;
            border-radius: 25px;
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 12px;
            text-align: center;
            
            /* Gradiente Animado en el Texto */
            background-image: linear-gradient(135deg, #ffffff, #ffb3d9, #ffffff, #ffe066, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* Lluvia de Emojis */
        .falling-emoji {
            position: absolute;
            top: -50px;
            z-index: 5;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        @keyframes fall {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            25% { transform: translateY(25vh) translateX(15px) rotate(90deg); }
            50% { transform: translateY(50vh) translateX(-15px) rotate(180deg); }
            75% { transform: translateY(75vh) translateX(10px) rotate(270deg); }
            100% { transform: translateY(110vh) translateX(0) rotate(360deg); opacity: 0; }
        }

        /* Chispas del Mouse */
        .mouse-spark {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 200;
            animation: sparkFade 1s ease-out forwards;
        }

        @keyframes sparkFade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Botón de Corazón Animado */
        #btnMusica {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ff4d94;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        /* Cuando la música está sonando */
        #btnMusica.playing {
            color: #ff0000;
            background: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 15px rgba(255, 77, 148, 0.8);
            animation: heartbeat 0.8s ease-in-out infinite; /* Late más rápido */
        }

        #btnMusica:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div id="rainContainer"></div>
    <div id="sparkleContainer"></div>

    <div class="overlay-center">
        <div class="name-box">NAOMY</div>
    </div>

    <audio id="miMusica" loop>
        <source src="ayayay.mp3" type="audio/mpeg">
    </audio>

    <button id="btnMusica" onclick="toggleMusica()">❤️</button>

    <script>
        // Lluvia de emojis
        const emojis = ['❤️', '🌻', '🌸', '✨', '🌹'];
        const container = document.getElementById('rainContainer');

        function createEmoji() {
            const e = document.createElement('div');
            e.classList.add('falling-emoji');
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            e.style.animationDuration = (Math.random() * 6 + 5) + 's';
            e.style.opacity = Math.random() * 0.5 + 0.5;
            container.appendChild(e);
            setTimeout(() => e.remove(), 11000);
        }
        setInterval(createEmoji, 400);

        // Efecto Mouse
        const sparkleContainer = document.getElementById('sparkleContainer');
        const sparkColors = ['#fff', '#ffd700', '#ffb3d9'];

        function createSparkle(x, y) {
            const spark = document.createElement('div');
            spark.classList.add('mouse-spark');
            spark.style.left = x + 'px';
            spark.style.top = y + 'px';
            spark.style.backgroundColor = sparkColors[Math.floor(Math.random() * sparkColors.length)];
            sparkleContainer.appendChild(spark);
            setTimeout(() => spark.remove(), 1000);
        }

        window.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.8) createSparkle(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', (e) => {
            createSparkle(e.touches[0].clientX, e.touches[0].clientY);
        });

        // Control de música y botón corazón
        function toggleMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            
            if (audio.paused) {
                audio.play();
                btn.classList.add('playing');
            } else {
                audio.pause();
                btn.classList.remove('playing');
            }
        }
    </script>
</body>
</html>
