<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Naomy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1a1a;
        }

        /* Fondo Animado con Degradado (Sin necesidad de imagen externa) */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1a1a, #2d1b2d, #1a1a1a);
            background-size: 400% 400%;
            z-index: -1;
            animation: moveGradient 15s ease infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Principal */
        .main-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            gap: 20px;
        }

        /* El nombre principal */
        .name-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            padding: 20px 50px;
            border-radius: 25px;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 12px;
            text-align: center;
            background-image: linear-gradient(135deg, #ffffff, #ffb3d9, #ffffff, #ffe066, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
        }

        /* Frases secundarias más pequeñas */
        .sub-text {
            font-size: clamp(1rem, 4vw, 1.8rem);
            font-weight: 700;
            text-align: center;
            min-height: 2.5rem;
            letter-spacing: 3px;
            background-image: linear-gradient(135deg, #ffffff, #ffb3d9, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* Contenedor del Botón */
        .heart-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tooltip-msg {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 12px;
            color: white;
            margin-bottom: 10px;
            animation: floatMsg 2s ease-in-out infinite;
        }

        @keyframes floatMsg {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        #btnMusica {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: #ff4d94;
            font-size: 35px;
            cursor: pointer;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 70%, 100% { transform: scale(1); }
            15%, 45% { transform: scale(1.15); }
        }

        /* Emojis y Chispas */
        .falling-emoji { position: absolute; top: -50px; z-index: 5; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div id="rainContainer"></div>

    <div class="main-container">
        <div class="name-box">NAOMY</div>
        <div class="sub-text" id="dynamicText">Eres mi persona favorita</div>
        
        <div class="heart-container">
            <div class="tooltip-msg" id="msg">Presiona el corazón</div>
            <button id="btnMusica" onclick="toggleMusica()">❤️</button>
        </div>
    </div>

    <audio id="miMusica" loop>
        <source src="ayayay.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Lista de frases que irán cambiando
        const frases = [
            "Eres mi persona favorita ✨",
            "La más bonita de todas 🌹",
            "Haces mi mundo mejor ❤️",
            "Siempre juntos 🌸",
            "Te quiero muchísimo 🐝"
        ];

        let index = 0;
        const textElement = document.getElementById('dynamicText');

        function changeText() {
            textElement.style.opacity = "0";
            setTimeout(() => {
                index = (index + 1) % frases.length;
                textElement.innerText = frases[index];
                textElement.style.opacity = "1";
            }, 1000);
        }
        setInterval(changeText, 4000); // Cambia cada 4 segundos

        // Lluvia de emojis
        const emojis = ['❤️', '🦫', '🌸', '✨', '🌹'];
        function createEmoji() {
            const e = document.createElement('div');
            e.classList.add('falling-emoji');
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            e.style.animationDuration = (Math.random() * 6 + 5) + 's';
            document.getElementById('rainContainer').appendChild(e);
            setTimeout(() => e.remove(), 11000);
        }
        setInterval(createEmoji, 400);

        function toggleMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            const msg = document.getElementById('msg');
            if (audio.paused) {
                audio.play();
                btn.style.animationDuration = "0.8s";
                msg.style.opacity = "0";
            } else {
                audio.pause();
                btn.style.animationDuration = "1.5s";
                msg.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
