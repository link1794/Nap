<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Naomy</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Fondo Animado */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Puedes cambiar esta URL por 'fondo.jpg' si tienes la imagen local */
            background-image: url('descarga (1).jfif'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: moveBackground 25s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Letrero Naomy */
        .overlay-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .name-box {
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 20px 50px;
            border-radius: 15px;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: bold;
            letter-spacing: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Lluvia de Emojis */
        .falling-emoji {
            position: absolute;
            top: -50px;
            z-index: 5;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* Botón de Música */
        #btnMusica {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }

        #btnMusica:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div id="rainContainer"></div>

    <div class="overlay-center">
        <div class="name-box">NAOMY</div>
    </div>

    <audio id="miMusica" loop>
        <source src="ayayay.mp3" type="audio/mpeg">
    </audio>

    <button id="btnMusica" onclick="toggleMusica()">🔈</button>

    <script>
        // Lluvia de emojis
        const emojis = ['❤️', '🌻', '🌸', '✨', '🌹'];
        const container = document.getElementById('rainContainer');

        function createEmoji() {
            const e = document.createElement('div');
            e.classList.add('falling-emoji');
            e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + 'vw';
            e.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            e.style.animationDuration = (Math.random() * 7 + 4) + 's';
            e.style.opacity = Math.random();
            
            container.appendChild(e);

            setTimeout(() => {
                e.remove();
            }, 10000);
        }

        setInterval(createEmoji, 300);

        // Control de música
        function toggleMusica() {
            const audio = document.getElementById('miMusica');
            const btn = document.getElementById('btnMusica');
            if (audio.paused) {
                audio.play();
                btn.innerText = "🔊";
            } else {
                audio.pause();
                btn.innerText = "🔈";
            }
        }
    </script>
</body>
</html>
